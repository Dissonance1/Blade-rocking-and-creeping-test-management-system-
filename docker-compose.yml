version: "3.9"

# =============================================================================
# Blade Rocking & Creep Test Management System — Docker Compose
#
# PRIVATE NETWORK DEPLOYMENT
# - All services run on an isolated bridge network (blade_rocking_net)
# - Only port 80 (and optionally 443) is exposed to the host LAN
# - Postgres and Redis ports are NOT exposed outside the container network
# - No internet access required after initial docker image build
#
# First-time setup:
#   1. cp .env.example .env  (edit passwords, SECRET_KEY, SERVER_IP)
#   2. docker-compose build
#   3. docker-compose up -d
#   4. docker-compose exec backend alembic upgrade head
#   5. docker-compose exec backend python scripts/seed_data.py
#
# Access from any machine on the LAN:  http://<SERVER_IP>/
# API docs (dev only):                 http://<SERVER_IP>/docs
# =============================================================================

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
    target: production
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - app_network
  restart: unless-stopped

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # PostgreSQL 15
  # NOT exposed to host — only accessible within app_network
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: blade_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blade_rocking}
      POSTGRES_USER: ${POSTGRES_USER:-blade_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NO host port mapping — Postgres is internal only
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blade_user} -d ${POSTGRES_DB:-blade_rocking}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis 7
  # NOT exposed to host — only accessible within app_network
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: blade_redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes:
      - redis_data:/data
    # NO host port mapping — Redis is internal only
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app_network
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # FastAPI Backend
  # NOT exposed to host — accessed only via NGINX reverse proxy
  # --------------------------------------------------------------------------
  backend:
    <<: *backend-common
    container_name: blade_backend
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./logs/backend:/app/logs
    # NO host port mapping — backend is accessed through nginx only
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --------------------------------------------------------------------------
  # Celery Worker (async report generation)
  # --------------------------------------------------------------------------
  celery_worker:
    <<: *backend-common
    container_name: blade_celery_worker
    command: >
      celery -A app.worker worker
      --loglevel=info
      -Q reports,celery
      --concurrency=2
      --max-tasks-per-child=50
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./logs/celery:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # React Frontend (served via NGINX in the container)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: blade_frontend
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # NGINX Reverse Proxy
  # SINGLE entry point exposed to the LAN — port 80 (HTTP)
  # For HTTPS on private LAN: use a self-signed cert or internal CA cert
  # See nginx/nginx.conf HTTPS block comments for TLS setup
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: blade_nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"       # LAN HTTP access — http://<SERVER_IP>/
      - "443:443"     # LAN HTTPS — only if ssl/ certs are mounted (see below)
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro        # Mount internal CA / self-signed certs here
      - ./logs/nginx:/var/log/nginx
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sfk", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ---------------------------------------------------------------------------
# Internal network — isolated bridge, no internet exposure needed
# ---------------------------------------------------------------------------
networks:
  app_network:
    driver: bridge
    name: blade_rocking_net
    internal: false   # Set true if the server itself has no internet (air-gapped)

# ---------------------------------------------------------------------------
# Named volumes — data persists across container restarts and upgrades
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    name: blade_postgres_data
  redis_data:
    name: blade_redis_data
