# =============================================================================
# Blade Rocking & Creep Test Management System — NGINX
#
# PRIVATE NETWORK DEPLOYMENT
# Topology: LAN clients → NGINX:443 (HTTPS) → backend | frontend
#           NGINX:80 redirects to 443
#
# Self-signed cert lives in ./ssl/fullchain.pem + ./ssl/privkey.pem
# Generated once with:
#   docker run --rm -v $(pwd)/ssl:/out alpine/openssl req -x509 -nodes \
#     -days 3650 -newkey rsa:2048 \
#     -keyout /out/privkey.pem -out /out/fullchain.pem \
#     -subj "/C=IN/ST=State/L=City/O=BladeRocking/CN=blade-rocking.local"
# =============================================================================

limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=10r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=20r/m;

resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# =============================================================================
# HTTP — redirect everything to HTTPS
# getUserMedia (camera) requires a secure context; plain HTTP blocks it.
# =============================================================================
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# =============================================================================
# HTTPS — main server
# =============================================================================
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # -------------------------------------------------------------------------
    # Gzip
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/vnd.ms-fontobject image/svg+xml;

    # -------------------------------------------------------------------------
    # Security headers
    # camera=(self) — allow camera from this origin (required for OCR scan)
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;

    # -------------------------------------------------------------------------
    # Proxy defaults
    # -------------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version                 1.1;
    proxy_connect_timeout              60s;
    proxy_send_timeout                 60s;
    proxy_read_timeout                 60s;

    set $backend_url  http://backend:8000;
    set $frontend_url http://frontend:80;

    # -------------------------------------------------------------------------
    # Nginx health check
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"nginx"}';
    }

    # -------------------------------------------------------------------------
    # Auth — strict rate limit
    # -------------------------------------------------------------------------
    location = /api/v1/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass $backend_url;
    }

    # -------------------------------------------------------------------------
    # WebSockets
    # -------------------------------------------------------------------------
    location /api/v1/ws/ {
        proxy_pass $backend_url;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /api/v1/weighing/ws {
        proxy_pass $backend_url;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # -------------------------------------------------------------------------
    # REST API
    # -------------------------------------------------------------------------
    rewrite ^(/api/v1/[a-z][a-z0-9-]*)$ $1/ last;

    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass $backend_url;
        proxy_request_buffering off;
        client_max_body_size 20m;
    }

    # -------------------------------------------------------------------------
    # FastAPI docs
    # -------------------------------------------------------------------------
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass $backend_url;
    }

    # -------------------------------------------------------------------------
    # Static assets
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map)$ {
        limit_req zone=static_limit burst=50 nodelay;
        proxy_pass $frontend_url;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # SPA fallback
    # -------------------------------------------------------------------------
    location / {
        proxy_pass $frontend_url;
    }

    # -------------------------------------------------------------------------
    # Deny hidden files
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }
}
