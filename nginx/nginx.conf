# =============================================================================
# Blade Rocking & Creep Test Management System — NGINX
#
# PRIVATE NETWORK DEPLOYMENT — HTTP only
# Topology: LAN clients → NGINX:80 → backend | frontend
# =============================================================================

limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=20r/m;

resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# =============================================================================
# HTTP — main server
# =============================================================================
server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Gzip
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/vnd.ms-fontobject image/svg+xml;

    # -------------------------------------------------------------------------
    # Security headers
    # camera=(self) — allow camera from this origin (required for OCR scan)
    # -------------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=()" always;
    # connect-src / img-src include http://localhost:8089 for the OAK-1
    # camera companion service (scripts/oak1_camera_service.py) — it runs
    # standalone on the same workstation as the browser, outside
    # nginx/Docker, so it's reached directly rather than proxied:
    #   connect-src — fetch() calls to /health and /snapshot
    #   img-src     — the live preview <img src="…/stream"> (MJPEG)
    # Without these the browser silently blocks the requests and the UI
    # falls back to the regular webcam with no visible error.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://localhost:8089; font-src 'self' data:; connect-src 'self' ws: http://localhost:8089; frame-ancestors 'none';" always;

    # -------------------------------------------------------------------------
    # Proxy defaults
    # -------------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version                 1.1;
    proxy_connect_timeout              60s;
    proxy_send_timeout                 60s;
    proxy_read_timeout                 60s;

    set $backend_url  http://backend:8000;
    set $frontend_url http://frontend:80;

    # -------------------------------------------------------------------------
    # Nginx health check
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"nginx"}';
    }

    # -------------------------------------------------------------------------
    # Auth — strict rate limit
    # -------------------------------------------------------------------------
    location = /api/v1/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass $backend_url;
    }

    # -------------------------------------------------------------------------
    # WebSockets
    # -------------------------------------------------------------------------
    location /api/v1/ws/ {
        proxy_pass $backend_url;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /api/v1/weighing/ws {
        proxy_pass $backend_url;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /api/v1/dti/ws {
        proxy_pass $backend_url;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Mounted at /api/v1/notifications/ws/notifications (router prefix
    # "/notifications" + route path "/ws/notifications") — does not match
    # the generic /api/v1/ws/ block above, so without this location it fell
    # through to the plain REST proxy below, which never upgrades the
    # connection and refuses the WebSocket handshake.
    location /api/v1/notifications/ws/notifications {
        proxy_pass $backend_url;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # -------------------------------------------------------------------------
    # REST API
    # -------------------------------------------------------------------------
    rewrite ^(/api/v1/[a-z][a-z0-9-]*)$ $1/ last;

    location /api/v1/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;
        proxy_pass $backend_url;
        proxy_request_buffering off;
        client_max_body_size 20m;
    }

    # -------------------------------------------------------------------------
    # FastAPI docs
    # -------------------------------------------------------------------------
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass $backend_url;
    }

    # -------------------------------------------------------------------------
    # Static assets
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map)$ {
        limit_req zone=static_limit burst=50 nodelay;
        proxy_pass $frontend_url;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # SPA fallback
    # -------------------------------------------------------------------------
    location / {
        proxy_pass $frontend_url;
    }

    # -------------------------------------------------------------------------
    # Deny hidden files
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }
}
