name: CI / CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/blade-rocking-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/blade-rocking-frontend
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# =============================================================================
# Jobs
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # 1. Backend tests
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend — pytest + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: blade_rocking_test
          POSTGRES_USER: blade_test
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U blade_test -d blade_rocking_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://blade_test:test_password@localhost:5432/blade_rocking_test
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: dev
      TESTING: "true"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libmagic1 tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70 \
            --tb=short \
            --strict-markers \
            -v \
            app/tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 2. Frontend tests
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend — TypeScript + lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Docker build + push (main branch pushes only)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker — build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Extract metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digests
        run: |
          echo "Backend image: ${{ steps.meta-backend.outputs.tags }}"
          echo "Frontend image: ${{ steps.meta-frontend.outputs.tags }}"

  # ---------------------------------------------------------------------------
  # 4. Deploy (triggered on version tag pushes: v*)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy — production server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build]
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: production
      url: https://${{ secrets.PROD_HOSTNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: SSH — pull images and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOSTNAME }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            cd ${{ secrets.PROD_APP_DIR }}

            echo "==> Logging in to GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pulling latest images (tag: ${{ steps.version.outputs.tag }})"
            docker-compose pull

            echo "==> Applying Alembic migrations"
            docker-compose run --rm backend alembic upgrade head

            echo "==> Restarting services with zero-downtime rolling update"
            docker-compose up -d --remove-orphans

            echo "==> Waiting for backend to become healthy"
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "Backend is healthy after ${i}*5s"
                break
              fi
              sleep 5
            done

            echo "==> Smoke test: /health endpoint"
            curl -sf http://localhost/health | grep '"status":"ok"' || \
              (echo "Health check FAILED" && exit 1)

            echo "==> Deployment of ${{ steps.version.outputs.tag }} complete"
