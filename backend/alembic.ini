# Alembic configuration file
# This file is read by `alembic` when invoked from the project root.
# Database URL is intentionally NOT hard-coded here; it is interpolated
# from the DATABASE_URL environment variable inside alembic/env.py.

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Template for new migration filenames.
# Produces names like: 20240101_143022_add_blade_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Prepend sys.path with the project root so that "app.*" imports work.
prepend_sys_path = .

# Timezone used in the file_template timestamp (default: UTC).
# timezone = UTC

# Truncate the slug component of generated filenames to this many chars.
truncate_slug_length = 40

# SQLAlchemy URL — overridden in env.py via os.environ["DATABASE_URL"].
# Leave this as a placeholder; env.py takes precedence.
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/blade_db

# --------------------------
# Logging configuration
# --------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
